name: Build Debug APK (Buildozer)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Habilita el botón "Run workflow" para ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Buildozer
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            python3-dev \
            zip \
            unzip \
            git \
            openjdk-17-jdk
          pip install --upgrade buildozer cython virtualenv

      - name: Configurar Caché
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Compilar APK
        run: buildozer android debug

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: chrome-lite-anonymous-debug
          path: bin/*.apk
          
